version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: schedule_postgres
    restart: always
    environment:
      POSTGRES_USER: schedule_user
      POSTGRES_PASSWORD: schedule_password
      POSTGRES_DB: schedule_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
